<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="description" content="英语能力水平测试 - 10分钟测出你的英语水平">
<title>英语能力水平测试</title>
<style>
:root{--bg:#f2f4f8;--card:#fff;--text:#1a1d26;--text2:#6b7280;--text3:#9ca3af;--accent:#4f46e5;--accent2:#7c3aed;--gold:#f59e0b;--green:#10b981;--red:#ef4444;--border:rgba(0,0,0,.04)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.bg{position:fixed;inset:0;z-index:-2;background:linear-gradient(160deg,#f2f4f8,#e8ecf4,#f0eef8)}
.bg-shape{position:fixed;z-index:-1;border-radius:50%;filter:blur(80px);opacity:.35;pointer-events:none}
.bg-shape.s1{width:400px;height:400px;background:linear-gradient(135deg,#4f46e5,#7c3aed);top:-120px;right:-80px;animation:f1 20s ease-in-out infinite}
.bg-shape.s2{width:300px;height:300px;background:linear-gradient(135deg,#f59e0b,#f97316);bottom:-60px;left:-60px;animation:f2 25s ease-in-out infinite}
.bg-shape.s3{width:200px;height:200px;background:linear-gradient(135deg,#06b6d4,#3b82f6);top:40%;left:60%;animation:f3 18s ease-in-out infinite}
@keyframes f1{0%,100%{transform:translate(0,0) rotate(0)}50%{transform:translate(60px,-40px) rotate(5deg)}}
@keyframes f2{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,60px) rotate(-3deg)}}
@keyframes f3{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px) rotate(4deg)}}
.grid{position:fixed;inset:0;z-index:-1;opacity:.3;pointer-events:none;background-image:linear-gradient(rgba(79,70,229,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(79,70,229,.03) 1px,transparent 1px);background-size:48px 48px}
.ct{max-width:420px;margin:0 auto;padding:24px 16px 40px;position:relative}
.glass{background:rgba(255,255,255,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.5);border-radius:20px;padding:28px 24px;box-shadow:0 8px 32px rgba(0,0,0,.04);position:relative;overflow:hidden}
.glass::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6}
.glass+.glass{margin-top:12px}
.brand-bar{text-align:center;margin-bottom:24px;padding:8px 0}
.brand-bar .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 14px;border-radius:999px;font-size:10px;font-weight:600;background:rgba(79,70,229,.06);color:var(--accent);letter-spacing:.5px;border:1px solid rgba(79,70,229,.08);margin-bottom:10px}
.brand-bar h1{font-size:22px;font-weight:800;letter-spacing:-.3px;background:linear-gradient(135deg,#1a1d26,#4f46e5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.brand-bar p{font-size:12px;color:var(--text2);margin-top:3px}
.home-icon{font-size:48px;display:block;text-align:center;margin-bottom:6px}
.home-title{font-size:20px;font-weight:700;text-align:center;margin-bottom:2px}
.home-sub{font-size:12px;text-align:center;color:var(--text2);margin-bottom:16px}
.features{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.feat{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(0,0,0,.015);border-radius:10px;font-size:12px;color:var(--text);border:1px solid var(--border)}
.feat .fi-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;background:rgba(79,70,229,.06);flex-shrink:0}
.form-group{margin-bottom:12px}
.form-group label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px;letter-spacing:.3px}
.form-group input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;outline:none;transition:all .2s;background:rgba(0,0,0,.015)}
.form-group input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.08);background:#fff}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 16px rgba(79,70,229,.25)}
.btn-primary:hover{box-shadow:0 6px 24px rgba(79,70,229,.35);transform:translateY(-1px)}
.btn-second{background:rgba(0,0,0,.02);color:var(--text2);border:1px solid var(--border)}

.q-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.q-num{font-size:10px;font-weight:600;color:var(--text3);background:rgba(0,0,0,.025);padding:3px 10px;border-radius:6px;letter-spacing:.3px}
.q-progress{height:3px;background:rgba(0,0,0,.04);border-radius:2px;overflow:hidden;margin-bottom:14px}
.q-progress .qp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:2px;transition:width .5s ease}
.q-text{font-size:14px;font-weight:600;color:var(--text);line-height:1.7;margin-bottom:14px;padding:12px 14px;background:rgba(79,70,229,.02);border-radius:10px;border-left:2.5px solid var(--accent)}
.q-opts{display:flex;flex-direction:column;gap:6px}
.q-opt{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;background:rgba(255,255,255,.5);font-size:13px;color:var(--text);cursor:pointer;text-align:left;font-family:inherit;transition:all .2s;line-height:1.5}
.q-opt:hover{border-color:rgba(79,70,229,.2);background:rgba(79,70,229,.02)}
.q-opt .ql{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;font-size:10px;font-weight:700;margin-right:10px;color:#fff;background:#d1d5db;transition:all .2s}
.q-opt.correct{border-color:var(--green);background:rgba(16,185,129,.04)}
.q-opt.correct .ql{background:var(--green)}
.q-opt.wrong{border-color:var(--red);background:rgba(239,68,68,.04)}
.q-opt.wrong .ql{background:var(--red)}
.q-exp{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:11px;line-height:1.6;animation:fadeIn .3s ease}
.q-exp.right{border-left:2.5px solid var(--green);background:rgba(16,185,129,.04)}
.q-exp.wrong{border-left:2.5px solid var(--red);background:rgba(239,68,68,.04)}

.result{text-align:center}
.r-score-wrap{display:inline-flex;align-items:baseline;gap:4px;padding:16px 24px;background:linear-gradient(135deg,rgba(79,70,229,.04),rgba(124,58,237,.04));border-radius:16px;margin:4px auto 10px;border:1px solid rgba(79,70,229,.08)}
.r-score{font-size:40px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.r-score-label{font-size:11px;color:var(--text3);margin-top:2px}
.r-badge{display:inline-block;padding:3px 14px;border-radius:999px;font-size:12px;font-weight:700;margin:6px 0 10px}
.r-level-A{background:rgba(16,185,129,.08);color:var(--green)}
.r-level-B{background:rgba(79,70,229,.06);color:var(--accent)}
.r-level-C{background:rgba(245,158,11,.08);color:#b45309}
.r-level-D{background:rgba(239,68,68,.06);color:var(--red)}
.r-detail{text-align:left;padding:14px;background:rgba(0,0,0,.01);border-radius:10px;margin:10px 0;border:1px solid var(--border)}
.r-detail h4{font-size:12px;font-weight:700;margin-bottom:5px}
.r-detail p{font-size:11px;color:var(--text2);line-height:1.7}
.pay-card{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:14px;padding:16px;margin:10px 0;text-align:center;border:1px solid rgba(245,158,11,.15)}
.pay-card .pc-title{font-size:13px;font-weight:700;color:#92400e}
.pay-card .pc-sub{font-size:10px;color:#a16207;margin:3px 0 8px}
.pay-card .pc-price{font-size:24px;font-weight:800;color:#1a1d26;margin-bottom:8px}
.pay-card .pc-btn{padding:8px 28px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.lead{background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:14px;padding:18px 16px;margin:10px 0;text-align:center;color:#fff;position:relative;overflow:hidden}
.lead::before{content:'';position:absolute;top:-40px;right:-40px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.03)}
.lead .l-title{font-size:14px;font-weight:700;margin-bottom:2px}
.lead .l-sub{font-size:10px;color:rgba(255,255,255,.5);margin-bottom:10px}
.lead-qr-row{display:flex;gap:20px;justify-content:center;align-items:center}
.lead-qr{width:72px;height:72px;border-radius:10px;overflow:hidden;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:28px}
.lead-qr-label{font-size:8px;color:rgba(255,255,255,.35);margin-top:3px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);padding:10px 20px;border-radius:10px;background:#1a1d26;font-size:12px;color:#fff;box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:999;opacity:0;transition:all .4s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn .35s ease}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-shape s1"></div>
<div class="bg-shape s2"></div>
<div class="bg-shape s3"></div>
<div class="grid"></div>
<div class="ct" id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ===== QUESTIONS with explanations =====
const QS = [
  {q:'She ___ to school by bus every day.',opts:['go','goes','going','went'],ans:1,exp:'主语 She 是第三人称单数，一般现在时动词要加 -es，所以用 goes。'},
  {q:'Which word means "非常漂亮的"?',opts:['Ugly','Beautiful','Angry','Tired'],ans:1,exp:'Beautiful 意为"美丽的、漂亮的"，其他选项：Ugly=丑的，Angry=生气的，Tired=累的。'},
  {q:'I have been studying English ___ three years.',opts:['for','since','from','in'],ans:0,exp:'时间段前面用 for（for three years）。Since 接时间点，from 接起点，in 接某个月/年。'},
  {q:'What is the past tense of "sing"?',opts:['Sang','Sung','Singed','Song'],ans:0,exp:'sing 的过去式是 sang（不规则变化）。Sung 是过去分词，Song 是名词"歌曲"。'},
  {q:'Choose the correct sentence:',opts:["He don't like coffee","He doesn't likes coffee","He doesn't like coffee","He not like coffee"],ans:2,exp:'第三人称单数否定用 doesn\'t + 动词原形，即 He doesn\'t like。'},
  {q:'The opposite of "difficult" is ___.',opts:['Hard','Easy','Heavy','Light'],ans:1,exp:'Difficult（困难的）反义词是 Easy（容易的）。Hard 也是"困难"的意思，Heavy=重的，Light=轻的。'},
  {q:'If I ___ you, I would study harder.',opts:['am','was','were','be'],ans:2,exp:'虚拟语气中，无论主语是什么，be 动词都用 were。If I were you 是固定表达"如果我是你的话"。'},
  {q:'What does "abandon" mean?',opts:['接受','放弃','拥抱','开始'],ans:1,exp:'Abandon 意为"放弃、抛弃"。接受=accept，拥抱=hug，开始=begin。'},
  {q:'She is ___ girl in our class.',opts:['tall','taller','tallest','the tallest'],ans:3,exp:'最高级要加 the。句中有 in our class 表示范围，用最高级 the tallest。'},
  {q:'Which is a correct greeting?',opts:['Goodbye','Nice to meet you','See you later','Take care'],ans:1,exp:'初次见面时用 "Nice to meet you"（很高兴认识你）是合适的问候语，其他都是告别语。'},
  {q:'He ran ___ than anyone else.',opts:['fast','faster','fastest','more fast'],ans:1,exp:'句中出现了 than（比），要用比较级。Fast 的比较级是 faster（更快的）。'},
  {q:'___ you like some tea?',opts:['Would','Do','Are','Have'],ans:0,exp:'委婉的邀请/建议用 Would you like...（你想要……吗），比 Do you like 更礼貌。'},
  {q:'The book ___ on the table.',opts:['is','am','are','be'],ans:0,exp:'主语 The book 是单数，所以用 is。Am 用于 I，are 用于复数。'},
  {q:'What is the synonym of "happy"?',opts:['Sad','Glad','Mad','Bad'],ans:1,exp:'Happy 的同义词是 Glad（高兴的）。Sad=伤心的，Mad=生气的，Bad=坏的。'},
  {q:'They ___ playing football now.',opts:['is','am','are','be'],ans:2,exp:'主语 They 是复数，现在进行时用 are + doing。They are playing 他们正在玩。'}
];
const LABELS=['A','B','C','D'];
let name='',wechat='',phone='',cur=0,answers=[];
const A=document.getElementById('app');

async function sv(d){try{await fetch('https://english-quiz-vercel.vercel.app/api/submissions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)})}catch(e){}}

function hm(){
  answers=[];cur=0;
  A.innerHTML=`<div class="fi" style="padding-top:8px">
    <div class="brand-bar"><div class="badge">✦ 英语能力测试</div><h1>英语水平测评</h1><p>15题 · 10分钟测出你的真实水平</p></div>
    <div class="glass" style="text-align:center">
      <span class="home-icon">📝</span><div class="home-title">开始测评</div><div class="home-sub">语法 · 词汇 · 阅读综合测试</div>
      <div class="features" style="text-align:left">
        <div class="feat"><span class="fi-icon">📖</span>15道精选英语选择题，每题含详细解析</div>
        <div class="feat"><span class="fi-icon">⚡</span>约10分钟完成</div>
        <div class="feat"><span class="fi-icon">📊</span>提交即出详细测评报告</div>
      </div>
    </div>
    <div class="glass">
      <div class="form-group"><label>👤 你的姓名</label><input type="text" id="ni" placeholder="请输入你的姓名" maxlength="20" onkeydown="if(event.key==='Enter')$('wi').focus()"/></div>
      <div class="form-group"><label>💬 微信号（选填，用于获取完整报告）</label><input type="text" id="wi" placeholder="你的微信号" maxlength="30" onkeydown="if(event.key==='Enter')$('pi').focus()"/></div>
      <div class="form-group"><label>📱 手机号（选填）</label><input type="tel" id="pi" placeholder="手机号码" maxlength="11" onkeydown="if(event.key==='Enter')sq()"/></div>
      <button class="btn btn-primary" onclick="sq()">开始测试 →</button>
    </div>
  </div>`;
  setTimeout(()=>$('ni')?.focus(),300);
}
function $(id){return document.getElementById(id)}

function sq(){
  name=($('ni')?.value||'').trim();wechat=($('wi')?.value||'').trim();phone=($('pi')?.value||'').trim();
  if(!name){st('请先输入你的姓名');$('ni').focus();return;}
  cur=0;answers=[];rq();
}

function rq(){
  if(cur>=QS.length)return setTimeout(sr,200);
  const q=QS[cur],c=cur+1;
  A.innerHTML=`<div class="fi" style="padding-top:8px">
    <div class="brand-bar" style="margin-bottom:12px"><div class="badge">✦ 第 ${c}/${QS.length} 题</div></div>
    <div class="glass">
      <div class="q-hd"><span class="q-num">⚡ ${Math.round(c/QS.length*100)}%</span><span class="q-num">💡 点击选项查看答案</span></div>
      <div class="q-progress"><div class="qp-fill" style="width:${c/QS.length*100}%"></div></div>
      <div class="q-text">${q.q}</div>
      <div class="q-opts" id="opts">${q.opts.map((o,i)=>'<button class="q-opt" onclick="pk('+i+')"><span class="ql">'+LABELS[i]+'</span>'+o+'</button>').join('')}</div>
      <div id="exp"></div>
    </div>
  </div>`;
}

function pk(i){
  const q=QS[cur];
  const btns=document.querySelectorAll('.q-opt');
  btns.forEach(b=>b.style.pointerEvents='none');
  const correct=i===q.ans;
  btns[i].classList.add(correct?'correct':'wrong');
  btns[q.ans].classList.add('correct');
  answers.push({selected:i,correct:q.ans,isCorrect:correct});

  // Show explanation
  const optText=q.opts[q.ans];
  const expDiv=document.getElementById('exp');
  if(correct){
    expDiv.innerHTML='<div class="q-exp right">✅ 正确！<br>'+q.exp+'</div>';
  }else{
    expDiv.innerHTML='<div class="q-exp wrong">❌ 正确答案是：<strong>'+LABELS[q.ans]+'. '+optText+'</strong><br>'+q.exp+'</div>';
  }

  setTimeout(()=>{cur++;cur>=QS.length?rq():(rq(),document.getElementById('opts')?.scrollIntoView({behavior:'smooth',block:'center'}));},correct?800:1800);
}

function sr(){
  const correct=answers.filter(a=>a.isCorrect).length;
  const pct=Math.round(correct/15*100);
  let lv,lb,lc,d;
  if(pct>=80){lv='A';lb='优秀';lc='r-level-A';d='你的英语基础非常扎实！建议继续保持，挑战更高难度。';}
  else if(pct>=60){lv='B';lb='良好';lc='r-level-B';d='你有不错的英语基础，通过系统学习完全可以达到优秀水平。';}
  else if(pct>=40){lv='C';lb='有待提高';lc='r-level-C';d='建议从核心语法和常用词汇入手，制定系统学习计划。';}
  else{lv='D';lb='基础薄弱';lc='r-level-D';d='建议从头系统学习，打好基础是关键。坚持就是胜利！';}
  sv({name,wechat,phone,score:correct,total:15,answers});
  document.getElementById('app').innerHTML=`<div class="fi" style="padding-top:8px">
    <div class="brand-bar"><div class="badge">✦ 测评完成</div><h1 style="font-size:18px">${name} 的成绩</h1></div>
    <div class="glass" style="text-align:center">
      <div class="r-score-wrap"><div><div class="r-score">${correct}</div><div class="r-score-label">/ 15 题</div></div></div>
      <div class="r-badge ${lc}">${lb}</div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px">正确率 ${pct}%</div>
      <div class="r-detail" style="border-left-color:var(--accent)"><h4>📋 测评结论</h4><p>${d}</p></div>
    </div>
    <div class="pay-card">
      <div class="pc-title">🔓 解锁完整分析报告</div>
      <div class="pc-sub">15道题逐题解析 + 个性化学习建议</div>
      <div class="pc-price">¥9.9</div>
      <button class="pc-btn" onclick="st('付费功能已预留 — 接入微信支付即可使用')">立即解锁</button>
    </div>
    <div class="lead">
      <div class="l-title">📲 扫码咨询 · 获取学习方案</div>
      <div class="l-sub">免费试听课 · 专属英语提升计划</div>
      <div class="lead-qr-row">
        <div><div class="lead-qr">🌐</div><div class="lead-qr-label">扫码测试</div></div>
        <div><div class="lead-qr">💬</div><div class="lead-qr-label">加微信</div></div>
      </div>
      <div style="font-size:7px;color:rgba(255,255,255,.25);margin-top:6px">专注英语教育 · 让学习更高效</div>
    </div>
    <div class="glass" style="text-align:center;padding:14px">
      <button class="btn btn-second" onclick="hm()" style="padding:8px">🔄 再测一次</button>
    </div>
  </div>`;
}

function st(m){const t=$('toast');if(!t)return;t.textContent=m;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2500);}
hm();
</script>
</body>
</html>
